<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Modelo</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Rubik&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./assets/css/styles.css">
</head>

<body>

    <section class="container">
        <div class="box">
            <table class="calculator">
                <div >
                    <tr class="container-input">
                        <td  colspan="4"><input type="text" class="display"></td>
                    </tr>

                </div>
                <div class="calculator-btn">
                    <tr>
                        <td><button class="btn btn-clear">CE</button></td>
                        <td><button class="btn btn-num">C</button></td>
                        <td><button class="btn btn-num">%</button></td>
                        <td><button class="btn-last btn-num btn-last">/</button></td>
                    </tr>
                    <tr>
                        <td><button class="btn btn-num">7</button></td>
                        <td><button class="btn btn-num">8</button></td>
                        <td><button class="btn btn-num">9</button></td>
                        <td><button class="btn-last btn-num btn-last">X</button></td>
                    </tr>
                    <tr>
                        <td><button class="btn btn-num">4</button></td>
                        <td><button class="btn btn-num">5</button></td>
                        <td><button class="btn btn-num">6</button></td>
                        <td><button class="btn-last btn-num btn-last">-</button></td>
                    </tr>
                    <tr>
                        <td><button class="btn btn-num">1</button></td>
                        <td><button class="btn btn-num">2</button></td>
                        <td><button class="btn btn-num">3</button></td>
                        <td><button class="btn-last btn-num btn-last">+</button></td>
                    </tr>
                    <tr>
                        <td><button class="btn btn-num">.</button></td>
                        <td><button class="btn btn-num">0</button></td>
                        <td><button class="btn btn-del">&laquo;</button></td>
                        <td><button class="btn-equal btn-eq">=</button></td>
                    </tr>
                </div>
            </table>
        </div>
    </section>

    <script src="./assets/js/main.js"></script>
</body>

</html>
